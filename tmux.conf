##### Prefix: make tmux feel like GNU Screen #####

# Use Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Terminal / color support #####

# Good default TERM inside tmux
set -g default-terminal "tmux-256color"

# Enable truecolor for common modern terminals
#set -as terminal-features ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"

##### General behavior #####

# Let tmux notice focus changes from the terminal
set -g focus-events on

# Better handling when terminal size changes
setw -g aggressive-resize on

# Start window and pane numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# When creating new windows/panes, keep numbering intuitive
set -g renumber-windows on

# Large scrollback history
set -g history-limit 100000

# Enable mouse support:
# - wheel scroll in copy mode / history
# - click to select pane/window
# - drag pane borders
set -g mouse on

# Allow applications to rename tmux windows
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_command}"

##### Status bar: Screen-like #####

set -g status on
set -g status-interval 10
set -g status-justify centre
set -g status-style "bg=black,fg=green"

set -g status-left-length 40
set -g status-left "#[fg=green,bg=black][ #[fg=brightgreen]#H #[fg=green]]"

set -g window-status-separator ""
set -g window-status-format "#[fg=white,bg=black] #I:#W "
set -g window-status-current-format "#[fg=red,bg=black](#[fg=brightwhite]#I*#W#[fg=red])"

set -g status-right-length 40
set -g status-right "#[fg=green,bg=black][#[fg=blue] %m/%d #[fg=white]%I:%M%p #[fg=green]]"

##### Sensible defaults for windows/panes #####

# Automatically set pane titles from the running command
set -g set-titles on
set -g set-titles-string "#S:#I:#W"

# Short escape delay makes key handling feel snappier over SSH
set -sg escape-time 200

